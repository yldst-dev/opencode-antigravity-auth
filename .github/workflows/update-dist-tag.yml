name: Update NPM Dist Tag

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to tag (e.g., 1.2.5)'
        required: true
        type: string
      tag:
        description: 'Dist tag to update (e.g., latest, beta)'
        required: true
        type: choice
        options:
          - latest
          - beta
          - next
          - canary

permissions:
  contents: read
  id-token: write

jobs:
  update-tag:
    runs-on: ubuntu-latest
    env:
      REQUESTED_VERSION: ${{ github.event.inputs.version }}
      DIST_TAG: ${{ github.event.inputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Use Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          always-auth: true

      - name: Validate version exists
        run: |
          set -euo pipefail
          echo "Checking if version $REQUESTED_VERSION exists on npm..."
          if ! npm view opencode-antigravity-auth@$REQUESTED_VERSION version >/dev/null 2>&1; then
            echo "ERROR: Version $REQUESTED_VERSION does not exist on npm" >&2
            echo "Available versions:" >&2
            npm view opencode-antigravity-auth versions --json | tail -20 >&2
            exit 1
          fi

          echo "Version $REQUESTED_VERSION exists on npm"
          echo "Current dist-tags:"
          npm dist-tag ls opencode-antigravity-auth

      - name: Update dist-tag
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          echo "Updating @$DIST_TAG tag to version $REQUESTED_VERSION..."
          npm dist-tag add opencode-antigravity-auth@$REQUESTED_VERSION $DIST_TAG

          echo ""
          echo "Updated dist-tags:"
          npm dist-tag ls opencode-antigravity-auth

      - name: Summary
        run: |
          echo "## NPM Dist Tag Updated! 🏷️" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** $REQUESTED_VERSION" >> $GITHUB_STEP_SUMMARY
          echo "**Tag:** @$DIST_TAG" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Users can now install with:" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "npm install opencode-antigravity-auth@$DIST_TAG" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
